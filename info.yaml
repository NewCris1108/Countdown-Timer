# Tiny Tapeout project information
project:
  title:        "Countdown Timer"
  author:       "Cris Zapata"
  discord:      ""      # leave blank if you don't have one
  description:  "8-bit countdown timer with 7-segment display output and done signal"
  language:     "Verilog"
  clock_hz:     50000000  # 50 MHz

  tiles: "1x1"

  top_module:  "tt_um_example"

  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "start"
  ui[1]: "preset bit 1"
  ui[2]: "preset bit 2"
  ui[3]: "preset bit 3"
  ui[4]: "preset bit 4"
  ui[5]: "preset bit 5"
  ui[6]: "preset bit 6"
  ui[7]: "preset bit 7"

  # Outputs
  uo[0]: "segment a"
  uo[1]: "segment b"
  uo[2]: "segment c"
  uo[3]: "segment d"
  uo[4]: "segment e"
  uo[5]: "segment f"
  uo[6]: "segment g"
  uo[7]: "done"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6